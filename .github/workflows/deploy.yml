name: AWS Production Deployment

on:
  push:
    branches: [ main, featurebranch ]

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_KEY }}
          port: 22
          script: |
            # Try both possible paths just in case
            if [ -d "/home/ubuntu/party-user-backend" ]; then
              cd /home/ubuntu/party-user-backend
            elif [ -d "/home/ubuntu/party/party-user-backend" ]; then
              cd /home/ubuntu/party/party-user-backend
            else
              echo "❌ Error: Could not find project directory!"
              exit 1
            fi
            
            git pull origin main || git pull origin featurebranch
            npm install --production
            pm2 restart user-backend || pm2 start server.js --name user-backend
            echo "🚀 User Backend Deployment successful!"
